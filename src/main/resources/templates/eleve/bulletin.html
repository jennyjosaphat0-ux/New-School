<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" th:href="@{/css/style.css}"><title>Mon Bulletin | SchoolVision</title>
<style>
@media print{.sidebar,.no-print{display:none!important}.main{margin-left:0!important;padding:24px!important}}
</style></head><body>
<div class="sidebar"><div class="sidebar-logo"><h2>🏫 SCHOOLVISION</h2><span>Espace Élève</span></div><a href="/eleve/dashboard" class="nav-link"><i class="fas fa-chart-pie"></i> Mon Tableau de Bord</a><div class="nav-section">Académique</div><a href="/eleve/notes" class="nav-link"><i class="fas fa-star"></i> Mes Notes</a><a href="/eleve/bulletin" class="nav-link"><i class="fas fa-file-alt"></i> Mon Bulletin</a><div class="nav-section">Compte</div><a href="/eleve/profil" class="nav-link"><i class="fas fa-user"></i> Mon Profil</a><div class="sidebar-footer"><form action="/logout" method="post"><button class="btn-logout"><i class="fas fa-power-off"></i> Déconnexion</button></form></div></div>
<div class="main">
  <div class="topbar no-print">
    <div><h1>Mon Bulletin</h1><p>Trimestre <span th:text="${trimestre}"></span></p></div>
    <div style="display:flex;gap:12px">
      <form class="no-print" style="display:flex;align-items:center;gap:10px">
        <select name="trimestre" onchange="this.form.submit()" style="padding:9px 14px;border-radius:8px;border:1.5px solid var(--border)">
          <option th:each="t : ${#numbers.sequence(1,3)}" th:value="${t}"
            th:text="'Trimestre '+${t}" th:selected="${t==trimestre}"></option>
        </select>
      </form>
      <button onclick="window.print()" class="btn btn-primary no-print"><i class="fas fa-print"></i> Imprimer / PDF</button>
    </div>
  </div>

  <div class="bulletin-wrap">
    <div class="bulletin-header">
      <h2>🏫 SCHOOLVISION</h2>
      <p>Bulletin Scolaire — Trimestre <span th:text="${trimestre}"></span></p>
    </div>

    <div class="bulletin-info">
      <div class="info-item"><label>Élève</label><span th:text="${eleve.nom+' '+eleve.prenom}"></span></div>
      <div class="info-item"><label>Classe</label><span th:text="${eleve.classe?.nomClasse ?: '-'}"></span></div>
      <div class="info-item"><label>Rang</label><span th:text="${rang}+'ème'"></span></div>
    </div>

    <div class="card">
      <table>
        <thead><tr><th>Matière</th><th>Note 1</th><th>Note 2</th><th>Examen</th><th>Moyenne</th><th>Mention</th></tr></thead>
        <tbody>
          <tr th:each="n : ${notes}">
            <td><strong th:text="${n.matiere.nom}"></strong></td>
            <td th:text="${n.note1 ?: '-'}"></td>
            <td th:text="${n.note2 ?: '-'}"></td>
            <td th:text="${n.noteExamen ?: '-'}"></td>
            <td><strong th:text="${n.moyenne ?: '-'}"></strong></td>
            <td><span class="tag"
              th:classappend="${n.moyenne != null and n.moyenne >= 10} ? 'tag-success' : 'tag-danger'"
              th:text="${n.mention}"></span></td>
          </tr>
        </tbody>
      </table>
      <div class="moyenne-box">
        <div class="lbl">Moyenne Générale</div>
        <div class="val" th:text="${moyenne != null ? #numbers.formatDecimal(moyenne,1,2) : 'N/A'}">-</div>
        <div class="lbl" style="margin-top:8px"
          th:text="${moyenne != null and moyenne >= 10} ? '✅ Admis(e)' : '⚠️ En difficulté'"></div>
      </div>
    </div>
  </div>
</div></body></html>
