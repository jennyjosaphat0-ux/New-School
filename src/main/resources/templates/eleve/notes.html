<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" th:href="@{/css/style.css}"><title>Mes Notes | SchoolVision</title></head><body>
<div class="sidebar"><div class="sidebar-logo"><img th:src="@{/images/logo.png}" alt="Logo" style="width:44px;height:44px;object-fit:contain;border-radius:8px"><h2>NEW SCOOL</h2><span>Espace Élève</span></div><a href="/eleve/dashboard" class="nav-link"><i class="fas fa-chart-pie"></i> Mon Tableau de Bord</a><div class="nav-section">Académique</div><a href="/eleve/notes" class="nav-link"><i class="fas fa-star"></i> Mes Notes</a><a href="/eleve/bulletin" class="nav-link"><i class="fas fa-file-alt"></i> Mon Bulletin</a><div class="nav-section">Compte</div><a href="/eleve/profil" class="nav-link"><i class="fas fa-user"></i> Mon Profil</a><div class="sidebar-footer"><form action="/logout" method="post"><button class="btn-logout"><i class="fas fa-power-off"></i> Déconnexion</button></form></div></div>
<div class="main">
  <div class="topbar">
    <div><h1>Mes Notes</h1><p>Résultats par matière et trimestre</p></div>
    <span class="badge badge-eleve">🎓 ÉLÈVE</span>
  </div>
  <div class="card" style="margin-bottom:20px">
    <form style="display:flex;align-items:center;gap:16px">
      <label style="font-weight:700;font-size:0.85rem">Trimestre :</label>
      <select name="trimestre" onchange="this.form.submit()" style="padding:9px 14px;border-radius:8px;border:1.5px solid var(--border)">
        <option th:each="t : ${#numbers.sequence(1,3)}" th:value="${t}"
          th:text="'Trimestre '+${t}" th:selected="${t==trimestre}"></option>
      </select>
    </form>
  </div>

  <!-- Moyenne box -->
  <div style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:16px;padding:24px 32px;color:white;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:0.78rem;opacity:0.8;text-transform:uppercase;letter-spacing:1px">Moyenne Générale — Trimestre <span th:text="${trimestre}"></span></div>
      <div style="font-size:2.8rem;font-weight:900;margin-top:4px" th:text="${moyenne != null ? #numbers.formatDecimal(moyenne,1,2) : 'N/A'}">-</div></div>
    <div style="font-size:3rem">📊</div>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>Matière</th><th>Note 1</th><th>Note 2</th><th>Examen</th><th>Moyenne</th><th>Mention</th></tr></thead>
      <tbody>
        <tr th:each="n : ${notes}">
          <td><strong th:text="${n.matiere.nom}"></strong></td>
          <td th:text="${n.note1 ?: '-'}"></td>
          <td th:text="${n.note2 ?: '-'}"></td>
          <td th:text="${n.noteExamen ?: '-'}"></td>
          <td><strong style="font-size:1rem;color:var(--primary)" th:text="${n.moyenne ?: '-'}"></strong></td>
          <td><span class="tag"
            th:classappend="${n.moyenne != null and n.moyenne >= 10} ? 'tag-success' : 'tag-danger'"
            th:text="${n.mention}"></span></td>
        </tr>
        <tr th:if="${#lists.isEmpty(notes)}">
          <td colspan="6" style="text-align:center;color:var(--muted);padding:40px">Aucune note disponible pour ce trimestre.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div><script th:src="@{/js/responsive.js}"></script>
</body></html>
