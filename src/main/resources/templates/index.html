<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SchoolVision | Portail</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Inter',sans-serif;
      min-height:100vh;
      background: linear-gradient(135deg, #0a192f 0%, #112240 50%, #233554 100%);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap{width:100%;max-width:460px;padding:24px}

    .logo{text-align:center;margin-bottom:38px}

    .logo-box{
      width:82px;
      height:82px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:22px;
      margin:0 auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 18px 36px rgba(0,0,0,0.35);
      overflow:hidden;
    }

    .logo-box img{
      width:55px;
      height:55px;
      object-fit:contain;
    }

    .logo h1{
      color:white;
      font-size:1.9rem;
      font-weight:900;
      letter-spacing:3px;
    }

    .logo p{
      color:#64748b;
      font-size:0.82rem;
      margin-top:7px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:22px;
      padding:36px;
    }

    .card h2{
      color:white;
      font-size:1.2rem;
      font-weight:700;
      text-align:center;
      margin-bottom:6px;
    }

    .card>p{
      color:#475569;
      font-size:0.82rem;
      text-align:center;
      margin-bottom:26px;
    }

    .role{
      display:flex;
      align-items:center;
      gap:16px;
      padding:16px 20px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:13px;
      cursor:pointer;
      margin-bottom:10px;
      transition:all 0.25s;
      width:100%;
      text-align:left;
    }

    .role:hover{
      background:rgba(59,130,246,0.15);
      border-color:#3b82f6;
      transform:translateX(5px);
    }

    .role-ico{
      width:44px;
      height:44px;
      border-radius:11px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.15rem;
      flex-shrink:0;
    }

    .role-txt strong{
      color:white;
      display:block;
      font-size:0.9rem;
    }

    .role-txt span{
      color:#64748b;
      font-size:0.75rem;
    }

    .role-arrow{
      margin-left:auto;
      color:#475569;
    }

    /* MODAL */
    .overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      backdrop-filter:blur(8px);
      z-index:100;
      align-items:center;
      justify-content:center;
    }

    .overlay.show{display:flex}

    .modal{
      background:#1e293b;
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:38px;
      width:360px;
      position:relative;
      animation:up 0.3s ease;
    }

    @keyframes up{
      from{transform:translateY(28px);opacity:0}
      to{transform:translateY(0);opacity:1}
    }

    .modal h3{
      color:white;
      font-size:1.1rem;
      font-weight:700;
      margin-bottom:24px;
      text-align:center;
    }

    .x{
      position:absolute;
      top:14px;
      right:18px;
      background:none;
      border:none;
      color:#64748b;
      font-size:1.4rem;
      cursor:pointer;
    }

    .x:hover{color:white}

    .field{margin-bottom:16px}

    .field label{
      color:#94a3b8;
      font-size:0.78rem;
      font-weight:700;
      display:block;
      margin-bottom:7px;
    }

    .field input{
      width:100%;
      padding:12px 15px;
      background:rgba(255,255,255,0.06);
      border:1.5px solid rgba(255,255,255,0.1);
      border-radius:10px;
      color:white;
      font-size:0.9rem;
      outline:none;
    }

    .field input:focus{
      border-color:#3b82f6;
      background:rgba(59,130,246,0.1);
    }

    .btn-in{
      width:100%;
      padding:13px;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      border:none;
      border-radius:11px;
      color:white;
      font-weight:700;
      font-size:0.95rem;
      cursor:pointer;
      margin-top:6px;
    }

    .btn-in:hover{
      opacity:0.88;
      transform:translateY(-2px);
    }

    .err{
      background:rgba(239,68,68,0.15);
      border:1px solid rgba(239,68,68,0.3);
      color:#fca5a5;
      padding:11px 15px;
      border-radius:9px;
      margin-bottom:16px;
      font-size:0.83rem;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="logo">
    <div class="logo-box">
      <img th:src="@{/images/logo.png}" alt="Logo">
    </div>
    <h1>Bienvenue Au Collège Mixte Le Progrès</h1>
    <p> Portail de Gestion</p>
  </div>

  <div class="card">
    <h2>Bienvenue</h2>
    <p>Sélectionnez votre profil pour continuer</p>

    <button class="role" onclick="open_('Administrateur')">
      <div class="role-ico" style="background:rgba(99,102,241,0.2);color:#818cf8">
        <i class="fas fa-user-shield"></i>
      </div>
      <div class="role-txt">
        <strong>Administrateur</strong>
        <span>Gestion complète de l'établissement</span>
      </div>
      <i class="fas fa-chevron-right role-arrow"></i>
    </button>

    <button class="role" onclick="open_('Professeur')">
      <div class="role-ico" style="background:rgba(16,185,129,0.2);color:#34d399">
        <i class="fas fa-chalkboard-teacher"></i>
      </div>
      <div class="role-txt">
        <strong>Professeur</strong>
        <span>Saisie des notes et suivi des classes</span>
      </div>
      <i class="fas fa-chevron-right role-arrow"></i>
    </button>

    <button class="role" onclick="open_('Secrétaire')">
      <div class="role-ico" style="background:rgba(245,158,11,0.2);color:#fbbf24">
        <i class="fas fa-user-tie"></i>
      </div>
      <div class="role-txt">
        <strong>Secrétaire</strong>
        <span>Inscription et gestion des élèves</span>
      </div>
      <i class="fas fa-chevron-right role-arrow"></i>
    </button>

    <button class="role" onclick="open_('Élève / Parent')">
      <div class="role-ico" style="background:rgba(239,68,68,0.2);color:#f87171">
        <i class="fas fa-user-graduate"></i>
      </div>
      <div class="role-txt">
        <strong>Élève / Parent</strong>
        <span>Consulter notes, bulletin et profil</span>
      </div>
      <i class="fas fa-chevron-right role-arrow"></i>
    </button>

  </div>
</div>

<div class="overlay" id="ov" onclick="closeBg(event)">
  <div class="modal">
    <button class="x" onclick="close_()">×</button>
    <h3 id="mtitle">Connexion</h3>

    <div class="err" th:if="${param.error}">
      <i class="fas fa-exclamation-circle"></i> Email ou mot de passe incorrect.
    </div>

    <form th:action="@{/login}" method="post">
      <div class="field">
        <label>Email</label>
        <input type="email" name="username" placeholder="votre@email.com" required autofocus>
      </div>

      <div class="field">
        <label>Mot de passe / Code d'accès</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-in">
        <i class="fas fa-sign-in-alt"></i> Se connecter
      </button>
    </form>
  </div>
</div>

<script>
function open_(title){
  document.getElementById('mtitle').textContent='🔐 '+title;
  document.getElementById('ov').classList.add('show');
}
function close_(){
  document.getElementById('ov').classList.remove('show');
}
function closeBg(e){
  if(e.target.id==='ov') close_();
}
</script>

</body>
</html>
