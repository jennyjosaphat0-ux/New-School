<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" th:href="@{/css/style.css}"><title>Saisie Notes | SchoolVision</title>
<style>
.note-input{width:72px;padding:8px;text-align:center;border:1.5px solid var(--border);
  border-radius:8px;font-size:0.9rem;outline:none;transition:0.2s}
.note-input:focus{border-color:var(--primary)}
.moy-cell{font-weight:800;color:var(--primary);font-size:1rem}
</style></head><body>
<div class="sidebar">
  <div class="sidebar-logo"><img th:src="@{/images/logo.png}" alt="Logo" style="width:44px;height:44px;object-fit:contain;border-radius:8px"><h2>NEW SCOOL</h2><span>Professeur</span></div>
  <a href="/prof/dashboard" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
  <div class="sidebar-footer"><form action="/logout" method="post">
    <button class="btn-logout"><i class="fas fa-power-off"></i> Déconnexion</button>
  </form></div>
</div>
<div class="main">
  <div class="topbar">
    <div><h1 th:text="'Notes — '+${classe.nomClasse}">Notes</h1>
      <p th:text="'Trimestre '+${trimestre}+' — Saisir et sauvegarder les notes'"></p></div>
    <a href="/prof/dashboard" class="btn" style="background:#f1f5f9;color:var(--text)"><i class="fas fa-arrow-left"></i> Retour</a>
  </div>
  <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i><span th:text="${success}"></span></div>

  <!-- Filtre trimestre + matière -->
  <div class="card" style="margin-bottom:20px">
    <form style="display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap">
      <div class="form-group">
        <label>Trimestre</label>
        <select name="trimestre" style="padding:9px 14px;border-radius:8px;border:1.5px solid var(--border)">
          <option th:each="t : ${#numbers.sequence(1,3)}" th:value="${t}"
            th:text="'Trimestre '+${t}" th:selected="${t==trimestre}"></option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-filter"></i> Filtrer</button>
    </form>
  </div>

  <!-- Formulaire ajout note individuelle -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-title"><i class="fas fa-plus-circle" style="color:var(--success)"></i> Ajouter / Modifier une note</div>
    <form th:action="@{/prof/notes/sauvegarder}" method="post">
      <div class="form-grid">
        <div class="form-group">
          <label>Élève</label>
          <select name="eleve.id" required>
            <option value="">-- Sélectionner élève --</option>
            <option th:each="e : ${eleves}" th:value="${e.id}" th:text="${e.nom+' '+e.prenom}"></option>
          </select>
        </div>
        <div class="form-group">
          <label>Matière</label>
          <select name="matiere.id" required>
            <option value="">-- Matière --</option>
            <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
          </select>
        </div>
        <input type="hidden" name="classe.id" th:value="${classe.id}">
        <input type="hidden" name="trimestre" th:value="${trimestre}">
        <div class="form-group"><label>Note 1 (/ 20)</label><input type="number" name="note1" min="0" max="20" step="0.25" placeholder="0-20"></div>
        <div class="form-group"><label>Note 2 (/ 20)</label><input type="number" name="note2" min="0" max="20" step="0.25" placeholder="0-20"></div>
        <div class="form-group"><label>Note Examen (/ 20)</label><input type="number" name="noteExamen" min="0" max="20" step="0.25" placeholder="0-20"></div>
      </div>
      <button type="submit" class="btn btn-success" style="margin-top:20px"><i class="fas fa-save"></i> Sauvegarder</button>
    </form>
  </div>

  <!-- Tableau notes existantes -->
  <div class="card">
    <div class="card-title">Notes saisies — Trimestre <span th:text="${trimestre}"></span></div>
    <table>
      <thead><tr><th>Élève</th><th>Matière</th><th>Note 1</th><th>Note 2</th><th>Examen</th><th>Moyenne</th><th>Mention</th><th>Modifier</th></tr></thead>
      <tbody>
        <tr th:each="n : ${notes}">
          <td><strong th:text="${n.eleve.nom+' '+n.eleve.prenom}"></strong></td>
          <td th:text="${n.matiere.nom}"></td>
          <td th:text="${n.note1 ?: '-'}"></td>
          <td th:text="${n.note2 ?: '-'}"></td>
          <td th:text="${n.noteExamen ?: '-'}"></td>
          <td class="moy-cell" th:text="${n.moyenne ?: '-'}"></td>
          <td><span class="tag"
            th:classappend="${n.moyenne != null and n.moyenne >= 10} ? 'tag-success' : 'tag-danger'"
            th:text="${n.mention}"></span></td>
          <td><a th:href="@{/prof/notes/modifier/{id}(id=${n.id})}" class="btn btn-warning btn-sm">
            <i class="fas fa-edit"></i> Modifier
          </a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(notes)}">
          <td colspan="8" style="text-align:center;color:var(--muted);padding:32px">Aucune note pour ce trimestre. Utilisez le formulaire ci-dessus.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div><script th:src="@{/js/responsive.js}"></script>
</body></html>
