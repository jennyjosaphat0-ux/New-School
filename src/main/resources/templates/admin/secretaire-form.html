<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" th:href="@{/css/style.css}"><title>Ajouter Secrétaire | SchoolVision</title></head><body>
<div class="sidebar">
  <div class="sidebar-logo"><h2>🏫 SCHOOLVISION</h2><span>Administration</span></div>
  <a href="/admin/dashboard" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
  <div class="nav-section">Personnel</div>
  <a href="/admin/prof/nouveau" class="nav-link"><i class="fas fa-user-plus"></i> Ajouter Professeur</a>
  <a href="/admin/prof/liste" class="nav-link"><i class="fas fa-users"></i> Liste Professeurs</a>
  <a href="/admin/secretaire/nouveau" class="nav-link"><i class="fas fa-user-tie"></i> Ajouter Secrétaire</a>
  <a href="/admin/secretaire/liste" class="nav-link"><i class="fas fa-id-card"></i> Liste Secrétaires</a>
  <div class="nav-section">Élèves</div>
  <a href="/admin/eleves" class="nav-link"><i class="fas fa-graduation-cap"></i> Élèves par Classe</a>
  <div class="nav-section">Académique</div>
  <a href="/admin/notes" class="nav-link"><i class="fas fa-star-half-alt"></i> Notes</a>
  <a href="/admin/bulletins" class="nav-link"><i class="fas fa-file-invoice"></i> Bulletins</a>
  <div class="sidebar-footer"><form action="/logout" method="post">
    <button class="btn-logout"><i class="fas fa-power-off"></i> Déconnexion</button>
  </form></div>
</div>
<div class="main">
  <div class="topbar">
    <div><h1>Enregistrer un Secrétaire</h1><p>Code d'accès envoyé automatiquement par mail</p></div>
    <span class="badge badge-admin">🔑 ADMIN</span>
  </div>
  <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i><span th:text="${success}"></span></div>
  <div class="card" style="max-width:680px">
    <div class="card-title"><i class="fas fa-user-tie" style="color:var(--warning)"></i> Informations du Secrétaire</div>
    <form th:action="@{/admin/secretaire/sauvegarder}" th:object="${secretaire}" method="post">
      <div class="form-grid">
        <div class="form-group"><label>Nom</label><input type="text" th:field="*{nom}" placeholder="PIERRE" required></div>
        <div class="form-group"><label>Prénom</label><input type="text" th:field="*{prenom}" placeholder="Marie" required></div>
        <div class="form-group"><label>Email</label><input type="email" th:field="*{email}" placeholder="sec@email.com" required></div>
        <div class="form-group"><label>Téléphone</label><input type="tel" th:field="*{telephone}" placeholder="+509 XXXX XXXX"></div>
      </div>
      <div style="margin-top:28px;display:flex;gap:14px">
        <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Enregistrer &amp; Envoyer le code</button>
        <a href="/admin/secretaire/liste" class="btn" style="background:#f1f5f9;color:var(--text)"><i class="fas fa-times"></i> Annuler</a>
      </div>
    </form>
  </div>
</div></body></html>
