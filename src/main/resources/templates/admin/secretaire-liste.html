<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" th:href="@{/css/style.css}"><title>Secrétaires | SchoolVision</title></head><body>
<div class="sidebar">
  <div class="sidebar-logo"><h2>🏫 SCHOOLVISION</h2><span>Administration</span></div>
  <a href="/admin/dashboard" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
  <div class="nav-section">Personnel</div>
  <a href="/admin/prof/nouveau" class="nav-link"><i class="fas fa-user-plus"></i> Ajouter Professeur</a>
  <a href="/admin/prof/liste" class="nav-link"><i class="fas fa-users"></i> Liste Professeurs</a>
  <a href="/admin/secretaire/nouveau" class="nav-link"><i class="fas fa-user-tie"></i> Ajouter Secrétaire</a>
  <a href="/admin/secretaire/liste" class="nav-link"><i class="fas fa-id-card"></i> Liste Secrétaires</a>
  <div class="nav-section">Élèves</div>
  <a href="/admin/eleves" class="nav-link"><i class="fas fa-graduation-cap"></i> Élèves par Classe</a>
  <div class="nav-section">Académique</div>
  <a href="/admin/notes" class="nav-link"><i class="fas fa-star-half-alt"></i> Notes</a>
  <a href="/admin/bulletins" class="nav-link"><i class="fas fa-file-invoice"></i> Bulletins</a>
  <div class="sidebar-footer"><form action="/logout" method="post">
    <button class="btn-logout"><i class="fas fa-power-off"></i> Déconnexion</button>
  </form></div>
</div>
<div class="main">
  <div class="topbar">
    <div><h1>Liste des Secrétaires</h1><p>Gérer les secrétaires de l'établissement</p></div>
    <a href="/admin/secretaire/nouveau" class="btn btn-primary"><i class="fas fa-plus"></i> Ajouter</a>
  </div>
  <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i><span th:text="${success}"></span></div>
  <div class="card">
    <table>
      <thead><tr><th>Secrétaire</th><th>Email</th><th>Téléphone</th><th>Code</th><th>Statut</th><th>Action</th></tr></thead>
      <tbody>
        <tr th:each="s : ${secretaires}">
          <td><div class="td-user">
            <div class="avatar" style="background:linear-gradient(135deg,#f59e0b,#d97706)"
              th:text="${#strings.substring(s.prenom,0,1)}+${#strings.substring(s.nom,0,1)}">AB</div>
            <strong th:text="${s.nom+' '+s.prenom}"></strong>
          </div></td>
          <td th:text="${s.email}"></td>
          <td th:text="${s.telephone}"></td>
          <td><code style="background:#f1f5f9;padding:3px 8px;border-radius:6px;font-size:0.8rem" th:text="${s.codeConnexion}"></code></td>
          <td><span class="tag" th:text="${s.isActif()} ? 'Actif' : 'Révoqué'"
            th:classappend="${s.isActif()} ? 'tag-success' : 'tag-danger'"></span></td>
          <td>
            <form th:action="@{/admin/secretaire/revoquer/{id}(id=${s.id})}" method="post"
              onsubmit="return confirm('Révoquer ce secrétaire ?')">
              <button type="submit" class="btn btn-danger btn-sm" th:if="${s.isActif()}">
                <i class="fas fa-ban"></i> Révoquer
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div></body></html>
