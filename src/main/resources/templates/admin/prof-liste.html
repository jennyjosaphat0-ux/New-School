<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Professeurs | NewScool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h2>🏫 NEW SCOOL</h2><span>Administration</span></div>
  <a href="/admin/dashboard" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
  <div class="nav-section">Personnel</div>
  <a href="/admin/prof/nouveau" class="nav-link"><i class="fas fa-user-plus"></i> Ajouter Professeur</a>
  <a href="/admin/prof/liste" class="nav-link active"><i class="fas fa-users"></i> Liste Professeurs</a>
  <a href="/admin/secretaire/nouveau" class="nav-link"><i class="fas fa-user-tie"></i> Ajouter Secrétaire</a>
  <a href="/admin/secretaire/liste" class="nav-link"><i class="fas fa-id-card"></i> Liste Secrétaires</a>
  <div class="nav-section">Finance</div>
  <a href="/admin/paiements" class="nav-link"><i class="fas fa-money-bill-wave"></i> Paiements</a>
  <div class="sidebar-footer"><form action="/logout" method="post">
    <button class="btn-logout"><i class="fas fa-power-off"></i> Déconnexion</button>
  </form></div>
</div>
<div class="main">
  <div class="topbar">
    <div><h1>Liste des Professeurs</h1><p>Gérer et révoquer les enseignants</p></div>
    <a href="/admin/prof/nouveau" class="btn btn-primary"><i class="fas fa-plus"></i> Ajouter</a>
  </div>
  <div th:if="${success}" class="alert alert-success"><i class="fas fa-check-circle"></i><span th:text="${success}"></span></div>
  <div class="card">
    <table>
      <thead>
        <tr><th>Professeur</th><th>Email</th><th>Niveau</th><th>Téléphone</th><th>Code</th><th>Statut</th><th>Révoquer</th></tr>
      </thead>
      <tbody>
        <tr th:each="p : ${profs}">
          <td>
            <div class="td-user">
              <div class="avatar" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)"
                th:text="${#strings.substring(p.prenom,0,1)}+${#strings.substring(p.nom,0,1)}">AB</div>
              <strong th:text="${p.nom+' '+p.prenom}"></strong>
            </div>
          </td>
          <td th:text="${p.email}"></td>
          <td><span class="tag" th:classappend="${p.niveau=='Primaire'} ? 'tag-info' : 'tag-success'"
            th:text="${p.niveau}"></span></td>
          <td th:text="${p.telephone}"></td>
          <td><code style="background:#f1f5f9;padding:3px 8px;border-radius:6px;font-size:0.78rem"
            th:text="${p.codeConnexion}"></code></td>
          <td><span class="tag" th:classappend="${p.actif} ? 'tag-success' : 'tag-danger'"
            th:text="${p.actif} ? 'Actif' : 'Révoqué'"></span></td>
          <td>
            <form th:action="@{/admin/prof/revoquer/{id}(id=${p.id})}" method="post"
              onsubmit="return confirm('Révoquer ce professeur ?')" th:if="${p.actif}">
              <button type="submit" class="btn btn-danger btn-sm">
                <i class="fas fa-ban"></i> Révoquer
              </button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(profs)}">
          <td colspan="7" style="text-align:center;color:var(--muted);padding:36px">
            Aucun professeur enregistré.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script th:src="@{/js/responsive.js}"></script>
</body></html>
