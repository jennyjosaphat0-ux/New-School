<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Liste Élèves | NewScool</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h2>🏫 College Mixte Le Progre</h2><span>Secrétariat</span></div>
  <a href="/secretaire/dashboard" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
  <div class="nav-section">Élèves</div>
  <a href="/secretaire/eleve/nouveau" class="nav-link"><i class="fas fa-user-plus"></i> Inscrire un Élève</a>
  <a href="/secretaire/eleve/liste" class="nav-link active"><i class="fas fa-graduation-cap"></i> Liste des Élèves</a>
  <div class="nav-section">Paiements</div>
  <a href="/secretaire/paiements" class="nav-link"><i class="fas fa-money-bill-wave"></i> Historique Paiements</a>
  <div class="sidebar-footer"><form action="/logout" method="post">
    <button class="btn-logout"><i class="fas fa-power-off"></i> Déconnexion</button>
  </form></div>
</div>
<div class="main">
  <div class="topbar">
    <div><h1>Liste des Élèves</h1></div>
    <a href="/secretaire/eleve/nouveau" class="btn btn-success"><i class="fas fa-plus"></i> Inscrire</a>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr><th>#</th><th>Élève</th><th>Sexe</th><th>Classe</th><th>Email</th><th>Parent</th><th>Code</th><th>Paiement</th><th>Statut</th></tr>
      </thead>
      <tbody>
        <tr th:each="e,i : ${eleves}">
          <td th:text="${i.count}"></td>
          <td>
            <div class="td-user">
              <div class="avatar"
                th:style="${e.sexe != null and e.sexe.name() == 'FEMININ'} ? 'background:linear-gradient(135deg,#ec4899,#8b5cf6)' : 'background:linear-gradient(135deg,#3b82f6,#10b981)'"
                th:text="${#strings.substring(e.prenom,0,1)}+${#strings.substring(e.nom,0,1)}">AB</div>
              <div>
                <strong th:text="${e.nom+' '+e.prenom}"></strong>
                <div style="font-size:0.75rem;color:var(--muted)" th:text="${e.age}+' ans'"></div>
              </div>
            </div>
          </td>
          <td>
            <span th:text="${e.sexe != null and e.sexe.name() == 'FEMININ'} ? '👧 F' : '👦 M'"></span>
          </td>
          <td th:text="${e.classe != null ? e.classe.nomClasse : '-'}"></td>
          <td th:text="${e.email != null ? e.email : '-'}"></td>
          <td th:text="${e.nomParent != null ? e.nomParent : '-'}"></td>
          <td><code style="background:#f1f5f9;padding:3px 8px;border-radius:6px;font-size:0.75rem"
            th:text="${e.codeConnexion != null ? '••••' : '-'}">••••</code></td>
          <td>
            <span class="tag tag-success"
              th:if="${statutsPaiement[e.id] == 'Paiement effectué'}">✓ Effectué</span>
            <span class="tag tag-warning"
              th:if="${statutsPaiement[e.id] == 'Paiement en cours'}">⏳ En cours</span>
            <span class="tag tag-danger"
              th:if="${statutsPaiement[e.id] == 'Non effectué'}">✗ Non effectué</span>
          </td>
          <td>
            <span class="tag tag-danger" th:if="${e.exclu}">Exclu</span>
            <span class="tag tag-success" th:unless="${e.exclu}">Actif</span>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(eleves)}">
          <td colspan="9" style="text-align:center;color:var(--muted);padding:40px">
            Aucun élève inscrit.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script th:src="@{/js/responsive.js}"></script>
</body></html>
